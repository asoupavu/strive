<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STRIVE | For Progress</title>
    <link rel="icon" type="image/png" href="/strive.png" />
    <style>
      :root {
        --bg: #f3efe8;
        --panel: #fff9f1;
        --text: #1f2a37;
        --muted: #667085;
        --accent: #c24d2c;
        --border: #ead7be;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top left, #fff8ec 0%, var(--bg) 65%);
      }

      main {
        width: min(680px, 92vw);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 1.2rem;
        text-align: center;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
      }

      .brand img {
        height: 68px;
        width: auto;
        display: block;
      }

      .tagline {
        font-size: 1rem;
        font-weight: 600;
      }

      h1 {
        margin: 0.7rem 0 0;
        font-size: clamp(1.4rem, 3.8vw, 2rem);
        line-height: 1.2;
      }

      p {
        margin: 0.55rem auto 0;
        max-width: 52ch;
        color: var(--muted);
      }

      .actions {
        margin-top: 1rem;
        display: flex;
        justify-content: center;
        gap: 0.5rem;
      }

      .btn {
        text-decoration: none;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.55rem 0.85rem;
        color: var(--text);
        background: #fff;
      }

      .btn.primary {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
    </style>
  </head>
  <body>
    <script>
      (function redirectRecoveryToResetPage() {
        const hash = window.location.hash || "";
        const hashParams = new URLSearchParams(hash.startsWith("#") ? hash.slice(1) : hash);
        const queryParams = new URLSearchParams(window.location.search || "");

        const isRecovery =
          hashParams.get("type") === "recovery" ||
          queryParams.get("type") === "recovery" ||
          (!!hashParams.get("access_token") && !!hashParams.get("refresh_token"));

        if (!isRecovery) return;

        const target = `/reset-password.html${window.location.search || ""}${window.location.hash || ""}`;
        window.location.replace(target);
      })();
    </script>

    <main>
      <div class="brand">
        <img src="/strive.png" alt="STRIVE" />
        <span class="tagline">For Progress</span>
      </div>

      <h1>Build better habits, one consistent day at a time.</h1>
      <p>Track your routines, review your progress, and stay accountable with friends while keeping private habits private.</p>

      <div class="actions">
        <a class="btn" href="/login.html">Log In</a>
        <a class="btn primary" href="/signup.html">Create Account</a>
      </div>
    </main>
  </body>
</html>
