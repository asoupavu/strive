<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STRIVE</title>
    <style>
      :root {
        --bg: #f4f1ea;
        --text: #1f2a37;
        --accent: #c24d2c;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background: radial-gradient(circle at top left, #fff8ec 0%, var(--bg) 65%);
        color: var(--text);
      }

      main {
        text-align: center;
        padding: 2rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 6vw, 4rem);
        letter-spacing: 0.08em;
      }

      p {
        margin-top: 0.75rem;
        font-size: 1.1rem;
      }

      .tag {
        display: inline-block;
        margin-top: 1.5rem;
        padding: 0.35rem 0.7rem;
        border: 1px solid var(--accent);
        color: var(--accent);
        border-radius: 999px;
        font-size: 0.85rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>STRIVE</h1>
      <p>Placeholder site is live. Real content coming soon.</p>
      <span class="tag">Version 0.1</span>
    </main>
  </body>
</html>
