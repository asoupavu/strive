<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STRIVE | Reset Password</title>
    <link rel="icon" type="image/png" href="/strive.png" />
    <style>
      :root {
        --bg: #f4f1ea;
        --panel: #fffaf2;
        --text: #1f2a37;
        --accent: #c24d2c;
        --muted: #6b7280;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background: radial-gradient(circle at top left, #fff8ec 0%, var(--bg) 65%);
        color: var(--text);
      }

      main {
        width: min(90vw, 430px);
        background: var(--panel);
        border: 1px solid #ecd8bf;
        border-radius: 16px;
        padding: 1.5rem;
      }

      h1 {
        margin: 0 0 0.55rem;
        line-height: 0;
      }

      .logo-title {
        height: 74px;
        width: auto;
        display: block;
      }

      p {
        margin: 0 0 1rem;
        color: var(--muted);
      }

      label {
        display: block;
        margin: 0.7rem 0 0.35rem;
        font-size: 0.9rem;
      }

      input {
        width: 100%;
        padding: 0.7rem 0.75rem;
        border-radius: 10px;
        border: 1px solid #d3c3ad;
        font-size: 1rem;
      }

      button {
        width: 100%;
        margin-top: 1rem;
        padding: 0.75rem;
        border: 0;
        border-radius: 10px;
        background: var(--accent);
        color: #fff;
        font-size: 1rem;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.65;
        cursor: wait;
      }

      #status {
        min-height: 1.5rem;
        margin-top: 0.85rem;
        font-size: 0.95rem;
        color: var(--muted);
      }

      .link-row {
        margin-top: 1rem;
        text-align: center;
        font-size: 0.95rem;
        color: var(--muted);
      }

      .link-row a {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1><img src="/strive.png" alt="STRIVE" class="logo-title" /></h1>
      <p>Set your new password.</p>

      <form id="reset-form">
        <label for="password">New password</label>
        <input id="password" type="password" autocomplete="new-password" minlength="6" required />

        <label for="confirm-password">Confirm new password</label>
        <input id="confirm-password" type="password" autocomplete="new-password" minlength="6" required />

        <button id="reset-btn" type="submit">Update password</button>
      </form>

      <div id="status"></div>
      <div class="link-row">
        Back to <a href="/login.html">log in</a>
      </div>
    </main>

    <script type="module">
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

      const SUPABASE_URL = "https://jlrlwfpbrxlitdiobkgy.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_43K-wSq-e_datCcSKN9yzA_tkWeAW0h";

      const statusEl = document.getElementById("status");
      const formEl = document.getElementById("reset-form");
      const resetBtn = document.getElementById("reset-btn");

      let recoveryReady = false;

      function setStatus(message) {
        statusEl.textContent = message;
      }

      const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      supabase.auth.onAuthStateChange((event) => {
        if (event === "PASSWORD_RECOVERY" || event === "SIGNED_IN") {
          recoveryReady = true;
        }
      });

      const { data: sessionData } = await supabase.auth.getSession();
      if (sessionData.session) {
        recoveryReady = true;
      } else {
        setStatus("Open this page from the reset link in your email.");
      }

      formEl.addEventListener("submit", async (event) => {
        event.preventDefault();

        if (!recoveryReady) {
          setStatus("Invalid or expired reset link. Request a new one.");
          return;
        }

        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirm-password").value;

        if (password !== confirmPassword) {
          setStatus("Passwords do not match.");
          return;
        }

        resetBtn.disabled = true;
        setStatus("Updating password...");

        const { error } = await supabase.auth.updateUser({ password });

        resetBtn.disabled = false;

        if (error) {
          setStatus(error.message);
          return;
        }

        setStatus("Password updated. Redirecting to log in...");
        setTimeout(async () => {
          await supabase.auth.signOut();
          window.location.href = "/login.html";
        }, 1200);
      });
    </script>
  </body>
</html>
